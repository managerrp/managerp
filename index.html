
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  .page{font-family:'Nunito',sans-serif;padding:1.25rem 1rem 1.5rem;max-width:680px;}
  .header{text-align:center;margin-bottom:1.25rem;}
  .header h1{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:3px;color:var(--color-text-primary);line-height:1;margin-bottom:2px;}
  .header p{font-size:12px;color:var(--color-text-secondary);}
  .tabs{display:flex;gap:6px;margin-bottom:1rem;background:var(--color-background-secondary);border-radius:10px;padding:4px;}
  .tab{flex:1;text-align:center;padding:7px 0;font-size:12px;font-weight:700;border-radius:7px;cursor:pointer;color:var(--color-text-secondary);transition:all 0.15s;}
  .tab.active{background:var(--color-background-primary);color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary);}
  .sec{display:none;}
  .sec.visible{display:block;}
  .league-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding:10px 14px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid var(--color-border-tertiary);}
  .league-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .league-info h2{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;color:var(--color-text-primary);line-height:1;}
  .league-info p{font-size:11px;color:var(--color-text-secondary);margin-top:1px;}
  .stats-row{display:flex;gap:6px;margin-bottom:1rem;}
  .stat-box{flex:1;background:var(--color-background-secondary);border-radius:8px;padding:8px;text-align:center;border:0.5px solid var(--color-border-tertiary);}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;}
  .stat-lbl{font-size:9px;color:var(--color-text-secondary);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-top:1px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:7px;}
  .team-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:12px 10px 11px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:relative;}
  .team-card.dolu{border-left:3px solid #16a34a;}
  .team-card.bos{border-left:3px solid #dc2626;opacity:0.6;}
  .team-name{font-size:12px;font-weight:700;color:var(--color-text-primary);line-height:1.3;flex:1;}
  .status-icon{flex-shrink:0;}
  .discord-btn{display:flex;align-items:center;justify-content:center;gap:10px;margin:1.25rem auto 0;background:#5865F2;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;text-decoration:none;padding:13px 30px;border-radius:10px;width:100%;}
  .discord-btn:hover{background:#4752c4;}
</style>

<div class="page">
  <div class="header">
    <h1>Manager RP</h1>
    <p>Türkiye Futbol Ligleri · Takım Durumları</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('sl',this)">⭐ Süper Lig</div>
    <div class="tab" onclick="switchTab('tff',this)">🔵 TFF 1. Lig</div>
  </div>

  <div class="sec visible" id="sec-sl">
    <div class="league-header">
      <div class="league-dot" style="background:#cc0000"></div>
      <div class="league-info">
        <h2>Süper Lig</h2>
        <p>2026–27 Sezonu · 18 Takım</p>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" style="color:#16a34a">18</div><div class="stat-lbl">Dolu</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#dc2626">0</div><div class="stat-lbl">Boş</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--color-text-primary)">18</div><div class="stat-lbl">Toplam</div></div>
    </div>
    <div class="grid" id="grid-sl"></div>
  </div>

  <div class="sec" id="sec-tff">
    <div class="league-header">
      <div class="league-dot" style="background:#1a1a2e"></div>
      <div class="league-info">
        <h2>TFF 1. Lig</h2>
        <p>2026–27 Sezonu · 20 Takım</p>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" style="color:#16a34a">18</div><div class="stat-lbl">Dolu</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#dc2626">2</div><div class="stat-lbl">Boş</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--color-text-primary)">20</div><div class="stat-lbl">Toplam</div></div>
    </div>
    <div class="grid" id="grid-tff"></div>
  </div>

  <a href="https://discord.gg/managerp" class="discord-btn" target="_blank">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    Sunucuya Katıl · discord.gg/managerp
  </a>
</div>

<script>
const SVG_DOLU = `<svg class="status-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="8" fill="#16a34a"/><path d="M4.5 8.5l2.5 2.5 4.5-5" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const SVG_BOS  = `<svg class="status-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="8" fill="#dc2626"/><path d="M5.5 5.5l5 5M10.5 5.5l-5 5" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>`;

const slTeams = [
  {name:'İstanbul Başakşehir', dolu:true},
  {name:'Galatasaray',         dolu:true},
  {name:'Beşiktaş JK',         dolu:true},
  {name:'Çaykur Rizespor',     dolu:true},
  {name:'Fenerbahçe',          dolu:true},
  {name:'Göztepe FK',          dolu:true},
  {name:'Erzurumspor FK',      dolu:true},
  {name:'Samsunspor',          dolu:true},
  {name:'Kocaelispor',         dolu:true},
  {name:'Trabzonspor',         dolu:true},
  {name:'Kasımpaşa FK',        dolu:true},
  {name:'Gaziantep FK',        dolu:true},
  {name:'Alanyaspor',          dolu:true},
  {name:'Konyaspor',           dolu:true},
  {name:'Antalyaspor',         dolu:true},
  {name:'Çorum FK',            dolu:true},
  {name:'Kayserispor',         dolu:true},
  {name:'Amed Sportif',        dolu:true},
];

const tffTeams = [
  {name:'Bursaspor',         dolu:true},
  {name:'Bodrumspor',        dolu:true},
  {name:'İstanbulspor',      dolu:true},
  {name:'Elazığspor',        dolu:true},
  {name:'Iğdır FK',          dolu:true},
  {name:'Gençlerbirliği',    dolu:true},
  {name:'İkas Eyüpspor',     dolu:true},
  {name:'Karagümrük',        dolu:true},
  {name:'Bandırmaspor',      dolu:true},
  {name:'Keçiörengücü',      dolu:true},
  {name:'Manisa FK',         dolu:true},
  {name:'Sivasspor',         dolu:true},
  {name:'Vanspor FK',        dolu:true},
  {name:'Boluspor',          dolu:false},
  {name:'Sarıyer SK',        dolu:true},
  {name:'Ümraniyespor',      dolu:true},
  {name:'Batman Petrolspor', dolu:true},
  {name:'Erokspor',          dolu:true},
  {name:'Pendikspor',        dolu:true},
  {name:'Aliağa FK',         dolu:true},
];

function makeCard(t){
  const card = document.createElement('div');
  card.className = 'team-card '+(t.dolu?'dolu':'bos');
  card.innerHTML = `<span class="team-name">${t.name}</span>${t.dolu ? SVG_DOLU : SVG_BOS}`;
  return card;
}

function buildGrid(teams, id){
  const g = document.getElementById(id);
  teams.forEach(t => g.appendChild(makeCard(t)));
}

function switchTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('visible'));
  el.classList.add('active');
  document.getElementById('sec-'+id).classList.add('visible');
}

buildGrid(slTeams,'grid-sl');
buildGrid(tffTeams,'grid-tff');
</script>
